name: fyloxa
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"  # 🔥 SAFE VERSION

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ✅ MAP + LOCATION
  google_maps_flutter: ^2.6.1
  geolocator: ^13.0.1

  # ✅ FIREBASE
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0

  # ✅ API + IMAGES
  http: ^0.13.6
  cached_network_image: ^3.3.1

  # ✅ DATE / FORMAT
  intl: ^0.20.2

  # 🔥 REQUIRED FOR LANGUAGE SYSTEM
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # ✅ APP ICON
  flutter_launcher_icons: ^0.13.1

  # ✅ SPLASH SCREEN
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true

  # ✅ ASSETS
  assets:
    - assets/

# =========================
# 🔥 APP ICON CONFIG
# =========================
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/fyloxa.jpg"

# =========================
# 🚀 SPLASH SCREEN CONFIG
# =========================
flutter_native_splash:
  color: "#000000"
  image: assets/fyloxa.jpg
  android: true
  ios: true

  android_12:
    image: assets/fyloxa.jpg
    icon_background_color: "#000000"